<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamConnect - Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.3);
        }

        .back-link {
            color: #22c55e;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            margin-right: 20px;
        }
        .back-link:hover { opacity: 0.7; }

        .page-title {
            color: #22c55e;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - Playlist Management */
        .sidebar {
            width: 300px;
            border-right: 1px solid rgba(34, 197, 94, 0.3);
            display: flex;
            flex-direction: column;
            background: rgba(34, 197, 94, 0.03);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
        }

        .sidebar-header h3 {
            color: #22c55e;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .create-row {
            display: flex;
            gap: 8px;
        }

        .create-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 6px;
            color: #fff;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
        }
        .create-input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
        }
        .create-input::placeholder { color: rgba(255,255,255,0.4); }

        .btn {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(34, 197, 94, 0.35);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }
        .btn.danger {
            background: rgba(220, 50, 50, 0.2);
            border-color: rgba(220, 50, 50, 0.5);
            color: #dc3232;
        }
        .btn.danger:hover {
            background: rgba(220, 50, 50, 0.35);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        .playlist-item:hover { background: rgba(34, 197, 94, 0.1); }
        .playlist-item.active {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .playlist-name {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
        }

        .playlist-count {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-left: 8px;
        }

        .playlist-actions {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .icon-btn.delete:hover { color: #dc3232; }

        /* Main Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Upload Bar */
        .upload-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
        }

        .upload-bar h3 {
            color: #22c55e;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #fileInput { display: none; }

        /* Track List */
        .track-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 24px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.playing {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .track-num {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            width: 30px;
            text-align: center;
        }
        .track-item.playing .track-num { color: #22c55e; }

        .track-play-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            transition: color 0.2s;
        }
        .track-play-btn:hover { color: #22c55e; }
        .track-item.playing .track-play-btn { color: #22c55e; }

        .track-title {
            flex: 1;
            font-size: 15px;
            margin-left: 8px;
        }
        .track-item.playing .track-title { color: #22c55e; font-weight: 600; }

        .track-duration {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            margin-right: 12px;
        }

        .track-actions {
            display: flex;
            gap: 2px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: rgba(255,255,255,0.3);
            font-size: 16px;
            gap: 12px;
        }
        .empty-state .icon { font-size: 48px; }

        /* Player Bar */
        .player-bar {
            border-top: 1px solid rgba(34, 197, 94, 0.3);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(34, 197, 94, 0.05);
        }

        .now-playing {
            width: 200px;
            overflow: hidden;
        }

        .now-playing .title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn {
            background: none;
            border: 2px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .ctrl-btn:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        .ctrl-btn.main {
            width: 48px;
            height: 48px;
            font-size: 20px;
            border-width: 3px;
        }
        .ctrl-btn.stop {
            border-color: rgba(220, 50, 50, 0.5);
            color: #dc3232;
        }
        .ctrl-btn.stop:hover {
            background: rgba(220, 50, 50, 0.2);
            border-color: #dc3232;
        }

        /* Progress */
        .progress-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #22c55e;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        /* Volume */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 140px;
        }

        .volume-icon {
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            cursor: pointer;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #22c55e;
            cursor: pointer;
        }

        /* Music bars animation */
        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
        }
        .music-bars .bar {
            width: 3px;
            background: #22c55e;
            border-radius: 1px;
            animation: musicBar 0.8s ease-in-out infinite alternate;
        }
        .music-bars .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .music-bars .bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
        .music-bars .bar:nth-child(3) { height: 8px; animation-delay: 0.3s; }

        @keyframes musicBar {
            0% { height: 4px; }
            100% { height: 16px; }
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; max-height: 250px; border-right: none; border-bottom: 1px solid rgba(34,197,94,0.3); }
            .now-playing { width: 120px; }
            .volume-section { width: 100px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="teamconnect.html" class="back-link">&larr; Back</a>
        <span class="page-title">&#9835; Music</span>
        <div class="music-bars hidden" id="musicBarsHeader" style="margin-left: 12px;">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="main-layout">
        <!-- Sidebar: Playlist Management -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Playlists</h3>
                <div class="create-row">
                    <input type="text" class="create-input" id="newPlaylistName" placeholder="New playlist name..." maxlength="50">
                    <button class="btn" onclick="createPlaylist()">+ Add</button>
                </div>
            </div>
            <div class="playlist-list" id="playlistList"></div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Upload Bar -->
            <div class="upload-bar">
                <h3 id="contentTitle">Select a playlist</h3>
                <div style="flex:1;"></div>
                <button class="btn" onclick="document.getElementById('fileInput').click()" id="uploadBtn" disabled>
                    &#128190; Upload MP3
                </button>
                <input type="file" id="fileInput" accept=".mp3,audio/mpeg" multiple onchange="handleFileUpload(event)">
            </div>

            <!-- Track List -->
            <div class="track-list" id="trackList">
                <div class="empty-state">
                    <div class="icon">&#9835;</div>
                    <div>Select or create a playlist to get started</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar">
        <div class="now-playing">
            <div class="title" id="nowPlayingTitle">No track selected</div>
            <div class="subtitle" id="nowPlayingPlaylist">-</div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevTrack()" id="prevBtn">&#9664;</button>
            <button class="ctrl-btn main" onclick="togglePlayPause()" id="playBtn">&#9654;</button>
            <button class="ctrl-btn stop" onclick="stopPlayback()" id="stopBtn">&#9632;</button>
            <button class="ctrl-btn" onclick="nextTrack()" id="nextBtn">&#9654;</button>
        </div>

        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer" onclick="seekTo(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-times">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="volume-section">
            <span class="volume-icon" onclick="toggleMute()">&#128266;</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        </div>
    </div>

    <script>
        // ========== STATE ==========
        let playlists = JSON.parse(localStorage.getItem('tc_playlists') || '[]');
        let activePlaylistId = null;
        let tracks = {}; // { playlistId: [{id, title, objectUrl, duration}] }
        let audioFiles = {}; // { trackId: File }
        let currentTrackIndex = -1;
        let isPlaying = false;
        const audio = new Audio();
        audio.volume = 0.8;

        // ========== PERSISTENCE ==========
        function savePlaylists() {
            const data = playlists.map(p => ({ ...p }));
            localStorage.setItem('tc_playlists', JSON.stringify(data));
        }

        function saveTrackMeta() {
            const meta = {};
            for (const pid in tracks) {
                meta[pid] = tracks[pid].map(t => ({ id: t.id, title: t.title, duration: t.duration }));
            }
            localStorage.setItem('tc_tracks_meta', JSON.stringify(meta));
        }

        function loadTrackMeta() {
            const meta = JSON.parse(localStorage.getItem('tc_tracks_meta') || '{}');
            for (const pid in meta) {
                if (!tracks[pid]) tracks[pid] = [];
                meta[pid].forEach(t => {
                    if (!tracks[pid].find(x => x.id === t.id)) {
                        tracks[pid].push({ ...t, objectUrl: null });
                    }
                });
            }
        }

        // ========== PLAYLISTS ==========
        function createPlaylist() {
            const input = document.getElementById('newPlaylistName');
            const name = input.value.trim();
            if (!name) return;
            const id = 'pl_' + Date.now();
            playlists.push({ id, name, created: new Date().toISOString() });
            tracks[id] = [];
            savePlaylists();
            input.value = '';
            renderPlaylists();
            selectPlaylist(id);
        }

        function selectPlaylist(id) {
            activePlaylistId = id;
            document.getElementById('uploadBtn').disabled = false;
            const pl = playlists.find(p => p.id === id);
            document.getElementById('contentTitle').textContent = pl ? pl.name : 'Tracks';
            renderPlaylists();
            renderTracks();
        }

        function renamePlaylist(id) {
            const pl = playlists.find(p => p.id === id);
            if (!pl) return;
            const newName = prompt('Rename playlist:', pl.name);
            if (newName && newName.trim()) {
                pl.name = newName.trim();
                savePlaylists();
                renderPlaylists();
                if (activePlaylistId === id) {
                    document.getElementById('contentTitle').textContent = pl.name;
                }
            }
        }

        function deletePlaylist(id) {
            if (!confirm('Delete this playlist and all its tracks?')) return;
            playlists = playlists.filter(p => p.id !== id);
            if (tracks[id]) {
                tracks[id].forEach(t => {
                    if (t.objectUrl) URL.revokeObjectURL(t.objectUrl);
                });
                delete tracks[id];
            }
            savePlaylists();
            saveTrackMeta();
            if (activePlaylistId === id) {
                activePlaylistId = null;
                document.getElementById('contentTitle').textContent = 'Select a playlist';
                document.getElementById('uploadBtn').disabled = true;
                stopPlayback();
            }
            renderPlaylists();
            renderTracks();
        }

        function renderPlaylists() {
            const container = document.getElementById('playlistList');
            if (playlists.length === 0) {
                container.innerHTML = '<div style="color:rgba(255,255,255,0.3);padding:20px;text-align:center;font-size:13px;">No playlists yet.<br>Create one above.</div>';
                return;
            }
            container.innerHTML = playlists.map(pl => {
                const count = (tracks[pl.id] || []).length;
                const active = pl.id === activePlaylistId ? 'active' : '';
                return `
                    <div class="playlist-item ${active}" onclick="selectPlaylist('${pl.id}')">
                        <span class="playlist-name">${escHtml(pl.name)}</span>
                        <span class="playlist-count">${count} tracks</span>
                        <div class="playlist-actions">
                            <button class="icon-btn" onclick="event.stopPropagation();renamePlaylist('${pl.id}')" title="Rename">&#9998;</button>
                            <button class="icon-btn delete" onclick="event.stopPropagation();deletePlaylist('${pl.id}')" title="Delete">&#10005;</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // ========== TRACKS ==========
        function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (!activePlaylistId || files.length === 0) return;
            if (!tracks[activePlaylistId]) tracks[activePlaylistId] = [];

            files.forEach(file => {
                if (!file.type.includes('audio') && !file.name.toLowerCase().endsWith('.mp3')) return;
                const id = 'tr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                const title = file.name.replace(/\.mp3$/i, '').replace(/[_-]/g, ' ').replace(/\s+/g, ' ').trim();
                const objectUrl = URL.createObjectURL(file);
                tracks[activePlaylistId].push({ id, title, objectUrl, duration: 0 });
                audioFiles[id] = file;

                // Get duration
                const tempAudio = new Audio(objectUrl);
                tempAudio.addEventListener('loadedmetadata', () => {
                    const track = tracks[activePlaylistId]?.find(t => t.id === id);
                    if (track) {
                        track.duration = tempAudio.duration;
                        saveTrackMeta();
                        renderTracks();
                    }
                });
            });

            saveTrackMeta();
            renderPlaylists();
            renderTracks();
            event.target.value = '';
        }

        function moveTrack(trackId, direction) {
            const list = tracks[activePlaylistId];
            if (!list) return;
            const idx = list.findIndex(t => t.id === trackId);
            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= list.length) return;
            [list[idx], list[newIdx]] = [list[newIdx], list[idx]];
            // Update currentTrackIndex if needed
            if (currentTrackIndex === idx) currentTrackIndex = newIdx;
            else if (currentTrackIndex === newIdx) currentTrackIndex = idx;
            saveTrackMeta();
            renderTracks();
        }

        function deleteTrack(trackId) {
            if (!confirm('Delete this track?')) return;
            const list = tracks[activePlaylistId];
            if (!list) return;
            const idx = list.findIndex(t => t.id === trackId);
            if (idx === -1) return;
            const track = list[idx];
            if (track.objectUrl) URL.revokeObjectURL(track.objectUrl);
            list.splice(idx, 1);
            delete audioFiles[trackId];
            if (currentTrackIndex === idx) stopPlayback();
            else if (currentTrackIndex > idx) currentTrackIndex--;
            saveTrackMeta();
            renderPlaylists();
            renderTracks();
        }

        function playTrackAt(index) {
            const list = tracks[activePlaylistId];
            if (!list || index < 0 || index >= list.length) return;
            const track = list[index];
            if (!track.objectUrl) return;

            currentTrackIndex = index;
            audio.src = track.objectUrl;
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayerUI();
            renderTracks();
        }

        function renderTracks() {
            const container = document.getElementById('trackList');
            if (!activePlaylistId) {
                container.innerHTML = '<div class="empty-state"><div class="icon">&#9835;</div><div>Select or create a playlist to get started</div></div>';
                return;
            }
            const list = tracks[activePlaylistId] || [];
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">&#128190;</div><div>No tracks yet. Upload MP3 files to add music.</div></div>';
                return;
            }
            container.innerHTML = list.map((track, i) => {
                const playing = (currentTrackIndex === i && isPlaying) ? 'playing' : '';
                const dur = formatTime(track.duration || 0);
                return `
                    <div class="track-item ${playing}">
                        <span class="track-num">${i + 1}</span>
                        <button class="track-play-btn" onclick="playTrackAt(${i})">${currentTrackIndex === i && isPlaying ? '&#10074;&#10074;' : '&#9654;'}</button>
                        <span class="track-title">${escHtml(track.title)}</span>
                        <span class="track-duration">${dur}</span>
                        <div class="track-actions">
                            <button class="icon-btn" onclick="moveTrack('${track.id}', -1)" title="Move up" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
                            <button class="icon-btn" onclick="moveTrack('${track.id}', 1)" title="Move down" ${i === list.length - 1 ? 'disabled' : ''}>&#9660;</button>
                            <button class="icon-btn delete" onclick="deleteTrack('${track.id}')" title="Delete">&#10005;</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // ========== PLAYER ==========
        function togglePlayPause() {
            if (!activePlaylistId) return;
            const list = tracks[activePlaylistId] || [];
            if (list.length === 0) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                if (currentTrackIndex < 0) currentTrackIndex = 0;
                const track = list[currentTrackIndex];
                if (track && track.objectUrl) {
                    if (audio.src !== track.objectUrl) audio.src = track.objectUrl;
                    audio.play().catch(() => {});
                    isPlaying = true;
                }
            }
            updatePlayerUI();
            renderTracks();
        }

        function stopPlayback() {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            currentTrackIndex = -1;
            updatePlayerUI();
            renderTracks();
        }

        function prevTrack() {
            if (!activePlaylistId) return;
            const list = tracks[activePlaylistId] || [];
            if (currentTrackIndex > 0) {
                playTrackAt(currentTrackIndex - 1);
            }
        }

        function nextTrack() {
            if (!activePlaylistId) return;
            const list = tracks[activePlaylistId] || [];
            if (currentTrackIndex < list.length - 1) {
                playTrackAt(currentTrackIndex + 1);
            }
        }

        function setVolume(val) {
            audio.volume = val / 100;
            audio.muted = false;
        }

        function toggleMute() {
            audio.muted = !audio.muted;
            document.querySelector('.volume-icon').textContent = audio.muted ? '🔇' : '🔊';
        }

        function seekTo(event) {
            if (!audio.duration) return;
            const rect = event.currentTarget.getBoundingClientRect();
            const pct = (event.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        }

        // Auto-advance
        audio.addEventListener('ended', () => {
            const list = tracks[activePlaylistId] || [];
            if (currentTrackIndex < list.length - 1) {
                playTrackAt(currentTrackIndex + 1);
            } else {
                stopPlayback();
            }
        });

        // Progress update
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
            document.getElementById('totalTime').textContent = formatTime(audio.duration);
        });

        function updatePlayerUI() {
            const playBtn = document.getElementById('playBtn');
            const bars = document.getElementById('musicBarsHeader');
            playBtn.innerHTML = isPlaying ? '&#10074;&#10074;' : '&#9654;';

            if (isPlaying) {
                bars.classList.remove('hidden');
                const list = tracks[activePlaylistId] || [];
                const track = list[currentTrackIndex];
                const pl = playlists.find(p => p.id === activePlaylistId);
                document.getElementById('nowPlayingTitle').textContent = track ? track.title : 'Unknown';
                document.getElementById('nowPlayingPlaylist').textContent = pl ? pl.name + ' • Track ' + (currentTrackIndex + 1) + '/' + list.length : '-';
            } else {
                bars.classList.add('hidden');
                if (currentTrackIndex < 0) {
                    document.getElementById('nowPlayingTitle').textContent = 'No track selected';
                    document.getElementById('nowPlayingPlaylist').textContent = '-';
                }
            }
        }

        // ========== HELPERS ==========
        function formatTime(sec) {
            if (!sec || isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Enter key to create playlist
        document.getElementById('newPlaylistName').addEventListener('keydown', e => {
            if (e.key === 'Enter') createPlaylist();
        });

        // ========== INIT ==========
        loadTrackMeta();
        renderPlaylists();
        renderTracks();
    </script>
</body>
</html>
