<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamTaste - Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; display: flex; flex-direction: column; }

        .header { display: flex; align-items: center; padding: 20px 30px; border-bottom: 1px solid rgba(218,165,32,0.3); }
        .back-link { color: #daa520; text-decoration: none; font-size: 18px; font-weight: bold; letter-spacing: 1px; transition: opacity 0.3s; margin-right: 20px; }
        .back-link:hover { opacity: 0.7; }
        .page-title { color: #daa520; font-size: 28px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 15px rgba(218,165,32,0.4); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; border-right: 1px solid rgba(218,165,32,0.3); display: flex; flex-direction: column; background: rgba(218,165,32,0.03); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(218,165,32,0.2); }
        .sidebar-header h3 { color: #daa520; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }

        .playlist-list { flex: 1; overflow-y: auto; padding: 10px; }
        .playlist-item { display: flex; align-items: center; padding: 12px 14px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; }
        .playlist-item:hover { background: rgba(218,165,32,0.1); }
        .playlist-item.active { background: rgba(218,165,32,0.2); border: 1px solid rgba(218,165,32,0.4); }
        .playlist-name { flex: 1; font-size: 15px; font-weight: 600; }
        .playlist-count { color: rgba(255,255,255,0.4); font-size: 12px; margin-left: 8px; }
        .playlist-cached { font-size: 11px; margin-left: 6px; padding: 2px 6px; border-radius: 4px; }
        .playlist-cached.full { background: rgba(218,165,32,0.2); color: #daa520; }
        .playlist-cached.partial { background: rgba(255,165,0,0.2); color: #ffa500; }
        .playlist-cached.none { display: none; }
        .playlist-default-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 2px 6px; transition: all 0.2s; color: rgba(255,255,255,0.2); margin-right: 6px; }
        .playlist-default-btn:hover { color: rgba(255,200,50,0.7); }
        .playlist-default-btn.is-default { color: #ffc832; text-shadow: 0 0 8px rgba(255,200,50,0.5); }

        /* Buttons */
        .btn { background: rgba(218,165,32,0.2); border: 1px solid rgba(218,165,32,0.5); color: #daa520; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
        .btn:hover { background: rgba(218,165,32,0.35); box-shadow: 0 0 10px rgba(218,165,32,0.3); }
        .btn.sync { background: rgba(0,150,255,0.2); border-color: rgba(0,150,255,0.5); color: #0096ff; }
        .btn.sync:hover { background: rgba(0,150,255,0.35); }
        .btn.sync.syncing { animation: syncPulse 1s ease-in-out infinite; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Content */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .upload-bar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 1px solid rgba(218,165,32,0.2); flex-wrap: wrap; }
        .upload-bar h3 { color: #daa520; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
        .sync-status { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: 8px; }
        .sync-status .cached { color: #daa520; }
        .sync-status .syncing { color: #0096ff; }

        /* Track list */
        .track-list { flex: 1; overflow-y: auto; padding: 10px 24px; }
        .track-item { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px; margin-bottom: 4px; transition: background 0.2s; border: 1px solid transparent; }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.playing { background: rgba(218,165,32,0.15); border-color: rgba(218,165,32,0.3); }
        .track-num { color: rgba(255,255,255,0.3); font-size: 14px; width: 30px; text-align: center; }
        .track-item.playing .track-num { color: #daa520; }
        .track-play-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 18px; padding: 4px 8px; transition: color 0.2s; }
        .track-play-btn:hover { color: #daa520; }
        .track-item.playing .track-play-btn { color: #daa520; }
        .track-title { flex: 1; font-size: 15px; margin-left: 8px; }
        .track-item.playing .track-title { color: #daa520; font-weight: 600; }
        .track-cache-icon { font-size: 12px; margin-right: 8px; }
        .track-cache-icon.cached { color: #daa520; }
        .track-cache-icon.not-cached { color: rgba(255,255,255,0.15); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: rgba(255,255,255,0.3); font-size: 16px; gap: 12px; }
        .empty-state .icon { font-size: 48px; }

        /* Bluetooth bar */
        .bt-bar { display:flex; align-items:center; gap:10px; padding:10px 24px; border-bottom:1px solid rgba(218,165,32,0.15); background:rgba(218,165,32,0.04); flex-wrap:wrap; font-size:13px; }
        .bt-status { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:20px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); }
        .bt-dot { width:10px; height:10px; border-radius:50%; background:#666; box-shadow:0 0 6px rgba(255,255,255,0.2); }
        .bt-status.on .bt-dot { background:#daa520; box-shadow:0 0 8px rgba(218,165,32,0.8); animation: btPulse 2s ease-in-out infinite; }
        .bt-status.off .bt-dot { background:#dc3232; box-shadow:0 0 6px rgba(220,50,50,0.6); }
        .bt-status.unknown .bt-dot { background:#888; }
        @keyframes btPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .bt-label { color:rgba(255,255,255,0.7); }
        .bt-device { color:#daa520; font-weight:600; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .bt-btn { background:rgba(218,165,32,0.15); border:1px solid rgba(218,165,32,0.5); color:#daa520; padding:10px 16px; border-radius:24px; cursor:pointer; font-weight:bold; font-size:14px; display:inline-flex; align-items:center; gap:8px; min-height:44px; transition:all 0.2s; }
        .bt-btn:hover, .bt-btn:active { background:rgba(218,165,32,0.3); box-shadow:0 0 10px rgba(218,165,32,0.4); }
        .bt-btn .icon { font-size:18px; }

        /* Player bar - TOUCH OPTIMIZED - always visible at top */
        .player-bar { border-bottom: 1px solid rgba(218,165,32,0.3); padding: 14px 20px; display: flex; align-items: center; gap: 16px; background: linear-gradient(180deg, rgba(20,15,5,0.98), rgba(12,8,2,0.95)); flex-wrap: wrap; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
        .now-playing { min-width: 180px; max-width: 260px; flex:1 1 180px; overflow: hidden; cursor:pointer; padding:4px; border-radius:8px; transition:background 0.2s; }
        .now-playing:hover, .now-playing:active { background:rgba(218,165,32,0.08); }
        .now-playing .title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-playing .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
        .now-playing .expand-hint { font-size:10px; color:rgba(218,165,32,0.5); margin-top:2px; letter-spacing:1px; }
        .player-controls { display: flex; align-items: center; gap: 10px; }
        .ctrl-btn { background: rgba(218,165,32,0.08); border: 2px solid rgba(218,165,32,0.5); color: #daa520; width: 56px; height: 56px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink:0; -webkit-tap-highlight-color: rgba(218,165,32,0.3); }
        .ctrl-btn:hover { background: rgba(218,165,32,0.2); border-color: #daa520; }
        .ctrl-btn:active { transform: scale(0.92); background: rgba(218,165,32,0.35); }
        .ctrl-btn.main { width: 72px; height: 72px; font-size: 30px; border-width: 3px; background:rgba(218,165,32,0.15); }
        .ctrl-btn.stop { border-color: rgba(220,50,50,0.5); color: #dc3232; background:rgba(220,50,50,0.08); }
        .ctrl-btn.stop:hover { background: rgba(220,50,50,0.2); border-color: #dc3232; }
        .ctrl-btn.stop:active { background: rgba(220,50,50,0.35); }
        .progress-section { flex: 1 1 220px; display: flex; flex-direction: column; gap: 6px; min-width:180px; }
        .progress-bar-container { width: 100%; height: 14px; background: rgba(255,255,255,0.12); border-radius: 7px; cursor: pointer; position:relative; padding: 4px 0; }
        .progress-bar-container::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #daa520, #ffd454); border-radius: 7px; width: 0%; transition: width 0.1s linear; box-shadow: 0 0 8px rgba(218,165,32,0.5); }
        .progress-times { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; }
        .volume-section { display: flex; align-items: center; gap: 10px; width: 180px; }
        .volume-icon { color: rgba(255,255,255,0.6); font-size: 22px; cursor: pointer; padding:6px; border-radius:50%; min-width:36px; text-align:center; }
        .volume-icon:hover, .volume-icon:active { background:rgba(255,255,255,0.08); color:#fff; }
        .volume-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #daa520; cursor: pointer; box-shadow: 0 0 8px rgba(218,165,32,0.5); border:2px solid #fff; }
        .volume-slider::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #daa520; cursor: pointer; border:2px solid #fff; }

        /* Fullscreen "Now Playing" overlay */
        .np-overlay { position:fixed; inset:0; background:linear-gradient(180deg, #1a1100 0%, #000 100%); z-index:1000; display:none; flex-direction:column; padding:24px; animation: npFadeIn 0.25s ease-out; }
        .np-overlay.open { display:flex; }
        @keyframes npFadeIn { from{opacity:0;} to{opacity:1;} }
        .np-close { align-self:flex-end; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; width:56px; height:56px; border-radius:50%; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; -webkit-tap-highlight-color:rgba(255,255,255,0.2); }
        .np-close:active { transform:scale(0.9); background:rgba(255,255,255,0.18); }
        .np-info { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; padding:20px; }
        .np-album-icon { font-size:120px; color:#daa520; text-shadow:0 0 40px rgba(218,165,32,0.6); animation: npSpin 4s linear infinite paused; }
        .np-album-icon.playing { animation-play-state:running; }
        @keyframes npSpin { to { transform:rotate(360deg); } }
        .np-title { font-size:clamp(22px, 5vw, 36px); font-weight:700; color:#fff; max-width:90%; word-break:break-word; }
        .np-subtitle { font-size:clamp(14px, 3vw, 20px); color:rgba(255,255,255,0.5); }
        .np-bt-pill { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; background:rgba(218,165,32,0.12); border:1px solid rgba(218,165,32,0.4); border-radius:20px; color:#daa520; font-size:14px; margin-top:8px; }
        .np-progress-wrap { width:100%; max-width:600px; display:flex; flex-direction:column; gap:8px; }
        .np-progress-bar-container { width:100%; height:18px; background:rgba(255,255,255,0.12); border-radius:9px; cursor:pointer; padding:5px 0; position:relative; }
        .np-progress-bar { height:100%; background:linear-gradient(90deg, #daa520, #ffd454); border-radius:9px; width:0%; box-shadow:0 0 10px rgba(218,165,32,0.6); }
        .np-times { display:flex; justify-content:space-between; font-size:14px; color:rgba(255,255,255,0.6); font-variant-numeric:tabular-nums; }
        .np-controls { display:flex; align-items:center; justify-content:center; gap:20px; padding:20px 0 40px; flex-wrap:wrap; }
        .np-btn { background:rgba(218,165,32,0.1); border:3px solid rgba(218,165,32,0.5); color:#daa520; width:90px; height:90px; border-radius:50%; cursor:pointer; font-size:36px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; -webkit-tap-highlight-color:rgba(218,165,32,0.3); }
        .np-btn:active { transform:scale(0.9); background:rgba(218,165,32,0.3); }
        .np-btn.main { width:130px; height:130px; font-size:54px; border-width:4px; background:rgba(218,165,32,0.18); box-shadow:0 0 30px rgba(218,165,32,0.3); }
        .np-btn.stop { border-color:rgba(220,50,50,0.5); color:#dc3232; background:rgba(220,50,50,0.1); }
        .np-btn.stop:active { background:rgba(220,50,50,0.3); }
        .np-volume-row { display:flex; align-items:center; gap:12px; width:100%; max-width:420px; margin:0 auto; }
        .np-volume-row .volume-icon { font-size:28px; }
        .np-volume-row .volume-slider { height:12px; }
        .np-volume-row .volume-slider::-webkit-slider-thumb { width:32px; height:32px; }
        @media (max-width: 480px) {
            .np-btn { width:72px; height:72px; font-size:28px; }
            .np-btn.main { width:100px; height:100px; font-size:42px; }
            .np-controls { gap:14px; }
        }

        .music-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .music-bars .bar { width: 3px; background: #daa520; border-radius: 1px; animation: musicBar 0.8s ease-in-out infinite alternate; }
        .music-bars .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .music-bars .bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
        .music-bars .bar:nth-child(3) { height: 8px; animation-delay: 0.3s; }
        @keyframes musicBar { 0% { height: 4px; } 100% { height: 16px; } }
        .hidden { display: none !important; }

        /* Sync progress bar */
        .sync-progress { width: 100%; height: 3px; background: rgba(0,150,255,0.1); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .sync-progress-fill { height: 100%; background: #0096ff; border-radius: 2px; width: 0%; transition: width 0.3s; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; max-height: 250px; border-right: none; border-bottom: 1px solid rgba(218,165,32,0.3); }
            .now-playing { min-width: 120px; flex-basis:120px; }
            .volume-section { width: 100%; order:5; }
            .player-bar { gap:10px; padding:12px; }
            .bt-bar { padding:8px 12px; gap:6px; }
            .bt-device { max-width:160px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="teamtaste.html" class="back-link">&larr; Back</a>
        <span class="page-title">&#9835; Music</span>
        <div class="music-bars hidden" id="musicBarsHeader" style="margin-left:12px;"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    </div>

    <!-- Bluetooth bar -->
    <div class="bt-bar">
        <div class="bt-status unknown" id="btStatus" title="Bluetooth availability">
            <span class="bt-dot"></span>
            <span class="bt-label" id="btStatusText">Checking Bluetooth&hellip;</span>
        </div>
        <div class="bt-status" id="btDeviceBox" style="background:rgba(218,165,32,0.06);">
            <span style="font-size:16px;">&#127911;</span>
            <span class="bt-label">Output:</span>
            <span class="bt-device" id="btDeviceName">Unknown</span>
        </div>
        <div style="flex:1;"></div>
        <button class="bt-btn" onclick="openBluetoothSettings()" title="Open phone Bluetooth settings">
            <span class="icon">&#128246;</span> Open Bluetooth
        </button>
        <button class="bt-btn" onclick="detectAudioOutput()" title="Detect connected Bluetooth speaker/headphones" style="background:rgba(0,150,255,0.12); border-color:rgba(0,150,255,0.5); color:#0096ff;">
            <span class="icon">&#128269;</span> Detect Device
        </button>
    </div>

    <div class="player-bar">
        <div class="now-playing" onclick="openNowPlaying()" title="Tap to expand">
            <div class="title" id="nowPlayingTitle">No track selected</div>
            <div class="subtitle" id="nowPlayingPlaylist">-</div>
            <div class="expand-hint">&#8607; TAP TO EXPAND</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevTrack()" title="Previous">&#9198;</button>
            <button class="ctrl-btn main" onclick="togglePlayPause()" id="playBtn" title="Play/Pause">&#9654;</button>
            <button class="ctrl-btn stop" onclick="stopPlayback()" title="Stop">&#9632;</button>
            <button class="ctrl-btn" onclick="nextTrack()" title="Next">&#9197;</button>
        </div>
        <div class="progress-section">
            <div class="progress-bar-container" onclick="seekTo(event)"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-times"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
        </div>
        <div class="volume-section">
            <span class="volume-icon" onclick="toggleMute()">&#128266;</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Playlists</h3>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <input type="text" class="create-input" id="newPlaylistName" placeholder="New playlist..." maxlength="50" style="flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(218,165,32,0.4);border-radius:6px;color:#fff;padding:8px 12px;font-size:13px;outline:none;">
                    <button class="btn" onclick="createPlaylist()">+ Add</button>
                </div>
            </div>
            <div class="playlist-list" id="playlistList">
                <div class="empty-state" style="padding:30px;"><div>Loading playlists...</div></div>
            </div>
        </div>

        <div class="content">
            <div class="upload-bar">
                <h3 id="contentTitle">Select a playlist</h3>
                <span class="sync-status" id="syncStatus"></span>
                <div style="flex:1;"></div>
                <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" disabled>
                    &#128190; Upload MP3
                </button>
                <input type="file" id="fileInput" accept=".mp3,audio/mpeg" multiple onchange="handleFileUpload(event)" style="display:none;">
                <button class="btn sync" id="syncBtn" onclick="syncToDevice()" disabled>
                    &#128229; Sync to Device
                </button>
            </div>
            <div id="syncProgressWrap" class="hidden" style="padding:0 24px;">
                <div class="sync-progress"><div class="sync-progress-fill" id="syncProgressBar"></div></div>
            </div>

            <div class="track-list" id="trackList">
                <div class="empty-state"><div class="icon">&#9835;</div><div>Select a playlist to get started</div></div>
            </div>
        </div>
    </div>

    <!-- Fullscreen "Now Playing" overlay for touch devices -->
    <div class="np-overlay" id="npOverlay">
        <button class="np-close" onclick="closeNowPlaying()" aria-label="Close">&times;</button>
        <div class="np-info">
            <div class="np-album-icon" id="npAlbumIcon">&#9835;</div>
            <div class="np-title" id="npTitle">No track selected</div>
            <div class="np-subtitle" id="npSubtitle">-</div>
            <div class="np-bt-pill" id="npBtPill"><span>&#127911;</span> <span id="npBtDevice">Unknown output</span></div>
            <div class="np-progress-wrap">
                <div class="np-progress-bar-container" onclick="seekTo(event)"><div class="np-progress-bar" id="npProgressBar"></div></div>
                <div class="np-times"><span id="npCurrentTime">0:00</span><span id="npTotalTime">0:00</span></div>
            </div>
        </div>
        <div class="np-controls">
            <button class="np-btn" onclick="prevTrack()" aria-label="Previous">&#9198;</button>
            <button class="np-btn main" onclick="togglePlayPause()" id="npPlayBtn" aria-label="Play/Pause">&#9654;</button>
            <button class="np-btn stop" onclick="stopPlayback()" aria-label="Stop">&#9632;</button>
            <button class="np-btn" onclick="nextTrack()" aria-label="Next">&#9197;</button>
        </div>
        <div class="np-volume-row">
            <span class="volume-icon" onclick="toggleMute()">&#128266;</span>
            <input type="range" class="volume-slider" id="npVolumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value); document.getElementById('volumeSlider').value=this.value;">
        </div>
    </div>

    <script>
        // ========== SUPABASE CONFIG ==========
        const SUPABASE_URL = 'https://infnlcqdwycjfssymeic.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluZm5sY3Fkd3ljamZzc3ltZWljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYxNDYzMzUsImV4cCI6MjA3MTcyMjMzNX0.Mo4wpqV5Ax-TqOwMpNXM4NqiHv7fC0TLM3wBKAPj15Q';
        const STORAGE_BUCKET = 'music';
        const DB_NAME = 'tt-music-cache';
        const DB_VERSION = 1;
        const STORE_NAME = 'audio-files';

        // ========== STATE ==========
        let playlists = [];
        let allTracks = {}; // { playlistId: [track, ...] }
        let activePlaylistId = null;
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isSyncing = false;
        let cachedTrackIds = new Set();
        let defaultPlaylistId = localStorage.getItem('tt_default_playlist') || null;
        const audio = new Audio();
        audio.volume = 0.8;

        // ========== SUPABASE HELPERS ==========
        async function sbFetch(path) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            return res.json();
        }

        function getPublicUrl(filePath) {
            return `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${filePath}`;
        }

        // ========== INDEXEDDB CACHE ==========
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function getCachedBlob(trackId) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(trackId);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }

        async function cacheBlob(trackId, blob, filePath, fileSize) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ id: trackId, blob, filePath, fileSize, cachedAt: Date.now() });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getAllCachedIds() {
            const db = await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAllKeys();
                req.onsuccess = () => resolve(new Set(req.result));
                req.onerror = () => resolve(new Set());
            });
        }

        async function getCachedMeta(trackId) {
            const entry = await getCachedBlob(trackId);
            if (!entry) return null;
            return { fileSize: entry.fileSize, filePath: entry.filePath, cachedAt: entry.cachedAt };
        }

        // ========== LOAD DATA ==========
        async function loadPlaylists() {
            try {
                playlists = await sbFetch('music_playlists?order=updated_at.desc,created_at.desc');
                cachedTrackIds = await getAllCachedIds();

                for (const pl of playlists) {
                    const tracks = await sbFetch(`music_tracks?playlist_id=eq.${pl.id}&order=sort_order.asc,created_at.asc`);
                    allTracks[pl.id] = tracks;
                }
                renderPlaylists();
                // Auto-select default playlist
                if (defaultPlaylistId && playlists.find(p => p.id === defaultPlaylistId)) {
                    selectPlaylist(defaultPlaylistId);
                }
            } catch (err) {
                document.getElementById('playlistList').innerHTML = '<div class="empty-state" style="padding:20px;color:#dc3232;">Failed to load playlists</div>';
            }
        }

        // ========== RENDER ==========
        function renderPlaylists() {
            const container = document.getElementById('playlistList');
            if (playlists.length === 0) {
                container.innerHTML = '<div style="color:rgba(255,255,255,0.3);padding:20px;text-align:center;font-size:13px;">No playlists found.</div>';
                return;
            }
            container.innerHTML = playlists.map(pl => {
                const tracks = allTracks[pl.id] || [];
                const cachedCount = tracks.filter(t => cachedTrackIds.has(t.id)).length;
                const total = tracks.length;
                const active = pl.id === activePlaylistId ? 'active' : '';
                let badgeClass = 'none', badgeText = '';
                if (total > 0 && cachedCount === total) { badgeClass = 'full'; badgeText = '✓ cached'; }
                else if (cachedCount > 0) { badgeClass = 'partial'; badgeText = `${cachedCount}/${total}`; }
                const isDef = pl.id === defaultPlaylistId;
                return `
                    <div class="playlist-item ${active}" onclick="selectPlaylist('${pl.id}')">
                        <button class="playlist-default-btn ${isDef ? 'is-default' : ''}" onclick="setDefaultPlaylist('${pl.id}', event)" title="${isDef ? 'Remove as default' : 'Set as default'}">&#9733;</button>
                        <span class="playlist-name">${esc(pl.name)}</span>
                        <span class="playlist-count">${total}</span>
                        <span class="playlist-cached ${badgeClass}">${badgeText}</span>
                        <span style="display:flex;gap:2px;margin-left:6px;">
                            <button onclick="event.stopPropagation();renamePlaylist('${pl.id}')" title="Rename" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:13px;padding:2px 4px;">&#9998;</button>
                            <button onclick="event.stopPropagation();deletePlaylist('${pl.id}')" title="Delete" style="background:none;border:none;color:rgba(220,50,50,0.5);cursor:pointer;font-size:13px;padding:2px 4px;">&#10005;</button>
                        </span>
                    </div>`;
            }).join('');
        }

        function renderTracks() {
            const container = document.getElementById('trackList');
            if (!activePlaylistId) {
                container.innerHTML = '<div class="empty-state"><div class="icon">&#9835;</div><div>Select a playlist</div></div>';
                return;
            }
            const list = allTracks[activePlaylistId] || [];
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">&#128190;</div><div>No tracks in this playlist.</div></div>';
                return;
            }
            container.innerHTML = list.map((track, i) => {
                const playing = (currentTrackIndex === i && isPlaying) ? 'playing' : '';
                const isCached = cachedTrackIds.has(track.id);
                const isFirst = i === 0, isLast = i === list.length - 1;
                return `
                    <div class="track-item ${playing}">
                        <span class="track-num">${i + 1}</span>
                        <button class="track-play-btn" onclick="playTrackAt(${i})">${currentTrackIndex === i && isPlaying ? '&#10074;&#10074;' : '&#9654;'}</button>
                        <span class="track-title">${esc(track.title)}</span>
                        <span class="track-cache-icon ${isCached ? 'cached' : 'not-cached'}">${isCached ? '&#128190;' : '&#9729;'}</span>
                        <span style="display:flex;gap:1px;margin-left:4px;">
                            <button onclick="moveTrack(${i},-1)" title="Move up" ${isFirst ? 'disabled' : ''} style="background:none;border:none;color:${isFirst ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.35)'};cursor:${isFirst ? 'default' : 'pointer'};font-size:12px;padding:2px 3px;">&#9650;</button>
                            <button onclick="moveTrack(${i},1)" title="Move down" ${isLast ? 'disabled' : ''} style="background:none;border:none;color:${isLast ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.35)'};cursor:${isLast ? 'default' : 'pointer'};font-size:12px;padding:2px 3px;">&#9660;</button>
                            <button onclick="deleteTrack('${track.id}', event)" title="Delete" style="background:none;border:none;color:rgba(220,50,50,0.5);cursor:pointer;font-size:13px;padding:2px 4px;">&#10005;</button>
                        </span>
                    </div>`;
            }).join('');
            updateSyncStatus();
        }

        function updateSyncStatus() {
            const list = allTracks[activePlaylistId] || [];
            const cachedCount = list.filter(t => cachedTrackIds.has(t.id)).length;
            const total = list.length;
            const el = document.getElementById('syncStatus');
            if (total === 0) { el.innerHTML = ''; return; }
            if (cachedCount === total) {
                el.innerHTML = '<span class="cached">&#10003; All ' + total + ' tracks cached on device</span>';
            } else {
                el.innerHTML = '<span>' + cachedCount + '/' + total + ' cached</span>';
            }
        }

        // ========== DEFAULT PLAYLIST ==========
        function setDefaultPlaylist(id, evt) {
            if (evt) evt.stopPropagation();
            if (defaultPlaylistId === id) {
                defaultPlaylistId = null;
                localStorage.removeItem('tt_default_playlist');
            } else {
                defaultPlaylistId = id;
                localStorage.setItem('tt_default_playlist', id);
            }
            renderPlaylists();
        }

        // ========== PLAYLIST SELECT ==========
        function selectPlaylist(id) {
            activePlaylistId = id;
            const pl = playlists.find(p => p.id === id);
            document.getElementById('contentTitle').textContent = pl ? pl.name : 'Tracks';
            document.getElementById('syncBtn').disabled = false;
            document.getElementById('uploadBtn').disabled = false;
            renderPlaylists();
            renderTracks();
        }

        // ========== SYNC TO DEVICE ==========
        async function syncToDevice() {
            if (!activePlaylistId || isSyncing) return;
            const list = allTracks[activePlaylistId] || [];
            if (list.length === 0) return;

            isSyncing = true;
            const btn = document.getElementById('syncBtn');
            const progressWrap = document.getElementById('syncProgressWrap');
            const progressBar = document.getElementById('syncProgressBar');
            btn.classList.add('syncing');
            btn.textContent = '⟳ Syncing...';
            progressWrap.classList.remove('hidden');

            let done = 0, skipped = 0, failed = 0;

            for (const track of list) {
                // Check if already cached with same file_size (unchanged)
                const meta = await getCachedMeta(track.id);
                if (meta && meta.filePath === track.file_path && meta.fileSize === track.file_size) {
                    skipped++;
                    done++;
                    progressBar.style.width = ((done / list.length) * 100) + '%';
                    btn.textContent = `⟳ ${done}/${list.length}`;
                    continue;
                }

                // Download and cache
                try {
                    const url = getPublicUrl(track.file_path);
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const blob = await response.blob();
                    await cacheBlob(track.id, blob, track.file_path, track.file_size);
                    cachedTrackIds.add(track.id);
                } catch (err) {
                    console.error('Failed to cache track:', track.title, err);
                    failed++;
                }
                done++;
                progressBar.style.width = ((done / list.length) * 100) + '%';
                btn.textContent = `⟳ ${done}/${list.length}`;
            }

            isSyncing = false;
            btn.classList.remove('syncing');
            const downloaded = done - skipped - failed;
            if (failed > 0) {
                btn.textContent = `⚠ ${failed} failed`;
            } else if (downloaded === 0) {
                btn.textContent = '✓ Already synced';
            } else {
                btn.textContent = `✓ ${downloaded} downloaded`;
            }
            setTimeout(() => { btn.textContent = '📥 Sync to Device'; progressWrap.classList.add('hidden'); }, 3000);

            renderPlaylists();
            renderTracks();
        }

        // ========== PLAYBACK ==========
        async function getAudioUrl(track) {
            // Try local cache first
            const cached = await getCachedBlob(track.id);
            if (cached && cached.blob) {
                return URL.createObjectURL(cached.blob);
            }
            // Fall back to Supabase public URL
            return getPublicUrl(track.file_path);
        }

        async function playTrackAt(index) {
            const list = allTracks[activePlaylistId];
            if (!list || index < 0 || index >= list.length) return;
            const track = list[index];
            currentTrackIndex = index;

            const url = await getAudioUrl(track);
            audio.src = url;
            audio.play().catch(() => {});
            isPlaying = true;
            updatePlayerUI();
            renderTracks();
        }

        function togglePlayPause() {
            if (!activePlaylistId) return;
            const list = allTracks[activePlaylistId] || [];
            if (list.length === 0) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                if (currentTrackIndex < 0) { playTrackAt(0); return; }
                audio.play().catch(() => {});
                isPlaying = true;
            }
            updatePlayerUI();
            renderTracks();
        }

        function stopPlayback() {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            currentTrackIndex = -1;
            updatePlayerUI();
            renderTracks();
        }

        function prevTrack() {
            if (currentTrackIndex > 0) playTrackAt(currentTrackIndex - 1);
        }

        function nextTrack() {
            const list = allTracks[activePlaylistId] || [];
            if (currentTrackIndex < list.length - 1) playTrackAt(currentTrackIndex + 1);
        }

        function setVolume(val) { audio.volume = val / 100; audio.muted = false; }
        function toggleMute() {
            audio.muted = !audio.muted;
            document.querySelector('.volume-icon').textContent = audio.muted ? '🔇' : '🔊';
        }
        function seekTo(event) {
            if (!audio.duration) return;
            const rect = event.currentTarget.getBoundingClientRect();
            audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
        }

        audio.addEventListener('ended', () => {
            const list = allTracks[activePlaylistId] || [];
            if (currentTrackIndex < list.length - 1) playTrackAt(currentTrackIndex + 1);
            else stopPlayback();
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = ((audio.currentTime / audio.duration) * 100) + '%';
            const cur = fmt(audio.currentTime), tot = fmt(audio.duration);
            document.getElementById('progressBar').style.width = pct;
            document.getElementById('currentTime').textContent = cur;
            document.getElementById('totalTime').textContent = tot;
            const npBar = document.getElementById('npProgressBar');
            if (npBar) npBar.style.width = pct;
            const npCur = document.getElementById('npCurrentTime');
            if (npCur) npCur.textContent = cur;
            const npTot = document.getElementById('npTotalTime');
            if (npTot) npTot.textContent = tot;
        });

        function updatePlayerUI() {
            const playIcon = isPlaying ? '&#10074;&#10074;' : '&#9654;';
            document.getElementById('playBtn').innerHTML = playIcon;
            const npPlay = document.getElementById('npPlayBtn');
            if (npPlay) npPlay.innerHTML = playIcon;
            const npIcon = document.getElementById('npAlbumIcon');
            if (npIcon) npIcon.classList.toggle('playing', isPlaying);
            const bars = document.getElementById('musicBarsHeader');
            const list = allTracks[activePlaylistId] || [];
            const track = list[currentTrackIndex];
            const pl = playlists.find(p => p.id === activePlaylistId);
            if (isPlaying) {
                bars.classList.remove('hidden');
                const title = track ? track.title : 'Unknown';
                const subtitle = pl ? pl.name + ' • Track ' + (currentTrackIndex + 1) + '/' + list.length : '-';
                document.getElementById('nowPlayingTitle').textContent = title;
                document.getElementById('nowPlayingPlaylist').textContent = subtitle;
                document.getElementById('npTitle').textContent = title;
                document.getElementById('npSubtitle').textContent = subtitle;
            } else {
                bars.classList.add('hidden');
                if (currentTrackIndex < 0) {
                    document.getElementById('nowPlayingTitle').textContent = 'No track selected';
                    document.getElementById('nowPlayingPlaylist').textContent = '-';
                    document.getElementById('npTitle').textContent = 'No track selected';
                    document.getElementById('npSubtitle').textContent = '-';
                } else if (track) {
                    document.getElementById('npTitle').textContent = track.title;
                }
            }
        }

        // ========== BLUETOOTH / AUDIO OUTPUT ==========
        async function checkBluetoothStatus() {
            const box = document.getElementById('btStatus');
            const txt = document.getElementById('btStatusText');
            box.classList.remove('on','off','unknown');
            try {
                if (navigator.bluetooth && typeof navigator.bluetooth.getAvailability === 'function') {
                    const available = await navigator.bluetooth.getAvailability();
                    if (available) { box.classList.add('on'); txt.textContent = 'Bluetooth: ON'; }
                    else { box.classList.add('off'); txt.textContent = 'Bluetooth: OFF'; }
                } else {
                    box.classList.add('unknown');
                    txt.textContent = 'BT status: check device';
                }
            } catch (e) {
                box.classList.add('unknown');
                txt.textContent = 'BT status: unavailable';
            }
        }

        function openBluetoothSettings() {
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = /android/.test(ua);
            const isIOS = /iphone|ipad|ipod/.test(ua) || (ua.includes('mac') && 'ontouchend' in document);
            if (isAndroid) {
                window.location.href = 'intent://settings#Intent;action=android.settings.BLUETOOTH_SETTINGS;end';
                setTimeout(() => {
                    if (!document.hidden) alert('Open phone Settings → Connected devices → Bluetooth manually.');
                }, 1500);
            } else if (isIOS) {
                const a = document.createElement('a');
                a.href = 'App-Prefs:root=Bluetooth';
                a.rel = 'noopener';
                a.click();
                setTimeout(() => {
                    if (!document.hidden) alert('iOS: Open Settings app → Bluetooth manually.\n(Direct links are blocked by Safari.)');
                }, 1200);
            } else {
                alert('Open your system Bluetooth settings and pair a speaker/headphones, then tap "Detect Device".');
            }
        }

        async function detectAudioOutput() {
            const nameEl = document.getElementById('btDeviceName');
            const npNameEl = document.getElementById('npBtDevice');
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                    nameEl.textContent = 'Not supported'; npNameEl.textContent = 'Not supported'; return;
                }
                let stream = null;
                try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
                catch (e) { /* permission denied - still try enumerate */ }
                const devices = await navigator.mediaDevices.enumerateDevices();
                if (stream) stream.getTracks().forEach(t => t.stop());

                const outputs = devices.filter(d => d.kind === 'audiooutput');
                if (outputs.length === 0) {
                    nameEl.textContent = 'No output devices';
                    npNameEl.textContent = 'No output devices';
                    return;
                }
                const def = outputs.find(d => d.deviceId === 'default') || outputs[0];
                let label = def.label || '(permission needed)';
                nameEl.textContent = label;
                npNameEl.textContent = label;
                if (/bluetooth|bt|airpods|beats|jbl|bose|sony|buds/i.test(label)) {
                    nameEl.style.color = '#daa520';
                    npNameEl.style.color = '#daa520';
                } else {
                    nameEl.style.color = '#ffc832';
                    npNameEl.style.color = '#ffc832';
                }
            } catch (e) {
                nameEl.textContent = 'Detection failed';
                npNameEl.textContent = 'Detection failed';
            }
        }

        if (navigator.bluetooth && navigator.bluetooth.addEventListener) {
            try { navigator.bluetooth.addEventListener('availabilitychanged', checkBluetoothStatus); } catch (e) {}
        }
        if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
            try { navigator.mediaDevices.addEventListener('devicechange', () => { detectAudioOutput(); }); } catch (e) {}
        }

        // ========== FULLSCREEN "NOW PLAYING" OVERLAY ==========
        function openNowPlaying() {
            document.getElementById('npOverlay').classList.add('open');
            document.getElementById('npVolumeSlider').value = Math.round(audio.volume * 100);
            updatePlayerUI();
            document.getElementById('npBtDevice').textContent = document.getElementById('btDeviceName').textContent;
        }
        function closeNowPlaying() {
            document.getElementById('npOverlay').classList.remove('open');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNowPlaying(); });

        // ========== CREATE PLAYLIST ==========
        async function createPlaylist() {
            const input = document.getElementById('newPlaylistName');
            const name = input.value.trim();
            if (!name) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/music_playlists`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify({ name })
                });
                const [pl] = await res.json();
                if (pl) {
                    playlists.unshift(pl);
                    allTracks[pl.id] = [];
                    input.value = '';
                    renderPlaylists();
                    selectPlaylist(pl.id);
                }
            } catch (err) { alert('Failed to create playlist'); }
        }

        // ========== RENAME PLAYLIST ==========
        async function renamePlaylist(id, evt) {
            if (evt) evt.stopPropagation();
            const pl = playlists.find(p => p.id === id);
            if (!pl) return;
            const newName = prompt('Rename playlist:', pl.name);
            if (!newName || !newName.trim()) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/music_playlists?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName.trim(), updated_at: new Date().toISOString() })
                });
                pl.name = newName.trim();
                renderPlaylists();
                if (activePlaylistId === id) document.getElementById('contentTitle').textContent = pl.name;
            } catch (err) { alert('Failed to rename'); }
        }

        // ========== DELETE PLAYLIST ==========
        async function deletePlaylist(id, evt) {
            if (evt) evt.stopPropagation();
            if (!confirm('Delete this playlist and all its tracks?')) return;
            try {
                // Delete tracks first
                await fetch(`${SUPABASE_URL}/rest/v1/music_tracks?playlist_id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                await fetch(`${SUPABASE_URL}/rest/v1/music_playlists?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                playlists = playlists.filter(p => p.id !== id);
                delete allTracks[id];
                if (activePlaylistId === id) {
                    activePlaylistId = null;
                    document.getElementById('contentTitle').textContent = 'Select a playlist';
                    document.getElementById('uploadBtn').disabled = true;
                    document.getElementById('syncBtn').disabled = true;
                    stopPlayback();
                }
                renderPlaylists();
                renderTracks();
            } catch (err) { alert('Failed to delete'); }
        }

        // ========== MOVE TRACK ==========
        async function moveTrack(index, direction) {
            const list = allTracks[activePlaylistId];
            if (!list) return;
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= list.length) return;

            // Swap in local array
            [list[index], list[newIndex]] = [list[newIndex], list[index]];

            // Update currentTrackIndex if affected
            if (currentTrackIndex === index) currentTrackIndex = newIndex;
            else if (currentTrackIndex === newIndex) currentTrackIndex = index;

            renderTracks();

            // Persist sort_order to Supabase
            try {
                const updates = list.map((t, i) =>
                    fetch(`${SUPABASE_URL}/rest/v1/music_tracks?id=eq.${t.id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sort_order: i })
                    })
                );
                await Promise.all(updates);
            } catch (err) { console.error('Failed to persist order:', err); }
        }

        // ========== DELETE TRACK ==========
        async function deleteTrack(trackId, evt) {
            if (evt) evt.stopPropagation();
            if (!confirm('Delete this track?')) return;
            const list = allTracks[activePlaylistId] || [];
            const idx = list.findIndex(t => t.id === trackId);
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/music_tracks?id=eq.${trackId}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                list.splice(idx, 1);
                if (currentTrackIndex === idx) stopPlayback();
                else if (currentTrackIndex > idx) currentTrackIndex--;
                renderPlaylists();
                renderTracks();
            } catch (err) { alert('Failed to delete track'); }
        }

        // ========== UPLOAD MP3 ==========
        async function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (!activePlaylistId || files.length === 0) return;
            const list = allTracks[activePlaylistId] || [];
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = '⟳ Uploading...';

            let uploaded = 0;
            for (const file of files) {
                if (!file.type.includes('audio') && !file.name.toLowerCase().endsWith('.mp3')) continue;
                const sanitized = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 100);
                const filePath = `${activePlaylistId}/${Date.now()}-${sanitized}`;
                const title = file.name.replace(/\.mp3$/i, '').replace(/[_-]/g, ' ').replace(/\s+/g, ' ').trim();

                try {
                    // Upload to storage
                    await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${filePath}`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': file.type || 'audio/mpeg', 'x-upsert': 'true' },
                        body: file
                    });
                    // Create track record
                    const sortOrder = list.length + uploaded;
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/music_tracks`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                        body: JSON.stringify({ playlist_id: activePlaylistId, title, file_path: filePath, mime_type: 'audio/mpeg', file_size: file.size, sort_order: sortOrder })
                    });
                    const [track] = await res.json();
                    if (track) list.push(track);
                    uploaded++;
                    btn.textContent = `⟳ ${uploaded}/${files.length}`;
                } catch (err) {
                    console.error('Upload failed:', file.name, err);
                }
            }

            btn.disabled = false;
            btn.textContent = uploaded > 0 ? `✓ ${uploaded} uploaded` : '⚠ Failed';
            setTimeout(() => { btn.innerHTML = '&#128190; Upload MP3'; }, 2000);
            event.target.value = '';
            renderPlaylists();
            renderTracks();
        }

        // Enter key for create playlist
        document.getElementById('newPlaylistName').addEventListener('keydown', e => { if (e.key === 'Enter') createPlaylist(); });

        // ========== HELPERS ==========
        function fmt(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60); const sec = Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ========== INIT ==========
        loadPlaylists();
        checkBluetoothStatus();
        (async () => {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;
                const devices = await navigator.mediaDevices.enumerateDevices();
                const outputs = devices.filter(d => d.kind === 'audiooutput');
                if (outputs.length > 0) {
                    const def = outputs.find(d => d.deviceId === 'default') || outputs[0];
                    const label = def.label || 'Tap "Detect Device"';
                    document.getElementById('btDeviceName').textContent = label;
                    document.getElementById('npBtDevice').textContent = label;
                } else {
                    document.getElementById('btDeviceName').textContent = 'None';
                    document.getElementById('npBtDevice').textContent = 'None';
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
