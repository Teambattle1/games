<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamTaste</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #daa520;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }
        .back-link:hover { opacity: 0.7; }

        .title {
            color: #daa520;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 60px;
            text-shadow: 0 0 20px rgba(218, 165, 32, 0.5);
        }

        .menu-row {
            display: flex;
            gap: 80px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .beta-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(255, 0, 0, 0.4);
            z-index: 2;
        }
        .menu-item:hover { transform: scale(1.1); }

        .menu-icon {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 215, 100, 0.9) 0%, rgba(218, 165, 32, 0.7) 50%, rgba(184, 134, 11, 0.8) 100%);
            box-shadow: 0 0 20px rgba(218,165,32,0.6), 0 0 40px rgba(218,165,32,0.4), 0 0 60px rgba(218,165,32,0.3), 0 0 80px rgba(218,165,32,0.2), inset 0 0 30px rgba(255,235,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,235,150,0.5);
            animation: pulse-gold 2s ease-in-out infinite;
        }

        .menu-icon::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 60%;
            height: 30%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        .menu-icon svg {
            width: 65px;
            height: 65px;
            fill: rgba(0, 0, 0, 0.8);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            position: relative;
            z-index: 1;
        }

        .menu-label {
            color: #daa520;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 20px rgba(218,165,32,0.6), 0 0 40px rgba(218,165,32,0.4), 0 0 60px rgba(218,165,32,0.3), 0 0 80px rgba(218,165,32,0.2), inset 0 0 30px rgba(255,235,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 30px rgba(218,165,32,0.8), 0 0 60px rgba(218,165,32,0.5), 0 0 90px rgba(218,165,32,0.4), 0 0 120px rgba(218,165,32,0.3), inset 0 0 30px rgba(255,235,150,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); }
        }

        .menu-item:hover .menu-icon {
            box-shadow: 0 0 40px rgba(218,165,32,0.9), 0 0 80px rgba(218,165,32,0.6), 0 0 120px rgba(218,165,32,0.4), 0 0 160px rgba(218,165,32,0.3), inset 0 0 30px rgba(255,235,150,0.5), inset 0 -20px 40px rgba(0,0,0,0.2);
            animation: none;
        }

        @media (max-width: 768px) {
            .menu-row { gap: 40px; }
            .menu-icon { width: 110px; height: 110px; }
            .menu-icon svg { width: 50px; height: 50px; }
            .menu-label { font-size: 16px; }
            .title { font-size: 28px; margin-bottom: 40px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back</a>
    <h1 class="title">TeamTaste</h1>
    <div class="menu-row">
        <a href="#" class="menu-item">
            <span class="beta-badge">Beta</span>
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
            </div>
            <span class="menu-label">Game</span>
        </a>
        <a href="#" class="menu-item">
            <span class="beta-badge">Beta</span>
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM4 6h9v5H4zm10 0h6v5h-6zm10 6v5H4v-5h16z"/>
                </svg>
            </div>
            <span class="menu-label">Infoscreen</span>
        </a>
        <a href="#" class="menu-item">
            <span class="beta-badge">Beta</span>
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7.5 21H2V9h5.5v12zm7.25-18h-5.5v18h5.5V3zM22 11h-5.5v10H22V11z"/>
                </svg>
            </div>
            <span class="menu-label">Ranking</span>
        </a>
        <a href="music-taste.html" class="menu-item">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <span class="menu-label">Music</span>
        </a>
    </div>
</body>
</html>
