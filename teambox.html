<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamBox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #2d8a2d;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }
        .back-link:hover { opacity: 0.7; }

        .title {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #fff;
        }
        .title .accent { color: #2d8a2d; text-shadow: 0 0 20px rgba(45, 138, 45, 0.5); }

        .subtitle {
            color: #2d8a2d;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .crew-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .crew-btn:hover {
            color: #2d8a2d;
            border-color: rgba(45, 138, 45, 0.5);
            background: rgba(45, 138, 45, 0.1);
            box-shadow: 0 0 15px rgba(45, 138, 45, 0.2);
        }

        @media (max-width: 768px) {
            .title { font-size: 28px; }
            .subtitle { font-size: 16px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back</a>
    <h1 class="title">Team<span class="accent">Box</span></h1>
    <p class="subtitle">Coming Soon</p>
    <a href="https://ccc.eventday.dk/teambox" class="crew-btn">CrewCenter</a>
</body>
</html>
