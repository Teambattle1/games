<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventDay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            gap: 80px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
        }

        .icon-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .icon-link:hover {
            transform: scale(1.1);
        }

        .icon {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, rgba(255, 140, 50, 0.9) 0%, rgba(255, 102, 0, 0.7) 50%, rgba(200, 80, 0, 0.8) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow:
                0 0 20px rgba(255, 102, 0, 0.6),
                0 0 40px rgba(255, 102, 0, 0.4),
                0 0 60px rgba(255, 102, 0, 0.3),
                0 0 80px rgba(255, 102, 0, 0.2),
                inset 0 0 30px rgba(255, 180, 100, 0.3),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 180, 100, 0.5);
            transition: all 0.3s ease;
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .icon::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 60%;
            height: 30%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(255, 102, 0, 0.6),
                    0 0 40px rgba(255, 102, 0, 0.4),
                    0 0 60px rgba(255, 102, 0, 0.3),
                    0 0 80px rgba(255, 102, 0, 0.2),
                    inset 0 0 30px rgba(255, 180, 100, 0.3),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(255, 102, 0, 0.8),
                    0 0 60px rgba(255, 102, 0, 0.5),
                    0 0 90px rgba(255, 102, 0, 0.4),
                    0 0 120px rgba(255, 102, 0, 0.3),
                    inset 0 0 30px rgba(255, 180, 100, 0.4),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
        }

        .icon-link:hover .icon {
            box-shadow:
                0 0 40px rgba(255, 102, 0, 0.9),
                0 0 80px rgba(255, 102, 0, 0.6),
                0 0 120px rgba(255, 102, 0, 0.4),
                0 0 160px rgba(255, 102, 0, 0.3),
                inset 0 0 30px rgba(255, 180, 100, 0.5),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .icon svg {
            width: 80px;
            height: 80px;
            fill: rgba(0, 0, 0, 0.8);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            position: relative;
            z-index: 1;
        }

        .label {
            color: #ff6600;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Gold - TeamTaste */
        .icon.gold {
            background: linear-gradient(135deg, rgba(255, 215, 100, 0.9) 0%, rgba(218, 165, 32, 0.7) 50%, rgba(184, 134, 11, 0.8) 100%);
            box-shadow:
                0 0 20px rgba(218, 165, 32, 0.6),
                0 0 40px rgba(218, 165, 32, 0.4),
                0 0 60px rgba(218, 165, 32, 0.3),
                0 0 80px rgba(218, 165, 32, 0.2),
                inset 0 0 30px rgba(255, 235, 150, 0.3),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 235, 150, 0.5);
            animation: pulse-gold 2s ease-in-out infinite;
        }

        @keyframes pulse-gold {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(218, 165, 32, 0.6),
                    0 0 40px rgba(218, 165, 32, 0.4),
                    0 0 60px rgba(218, 165, 32, 0.3),
                    0 0 80px rgba(218, 165, 32, 0.2),
                    inset 0 0 30px rgba(255, 235, 150, 0.3),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(218, 165, 32, 0.8),
                    0 0 60px rgba(218, 165, 32, 0.5),
                    0 0 90px rgba(218, 165, 32, 0.4),
                    0 0 120px rgba(218, 165, 32, 0.3),
                    inset 0 0 30px rgba(255, 235, 150, 0.4),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
        }

        .icon-link:hover .icon.gold {
            box-shadow:
                0 0 40px rgba(218, 165, 32, 0.9),
                0 0 80px rgba(218, 165, 32, 0.6),
                0 0 120px rgba(218, 165, 32, 0.4),
                0 0 160px rgba(218, 165, 32, 0.3),
                inset 0 0 30px rgba(255, 235, 150, 0.5),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .label.gold {
            color: #daa520;
        }

        /* Green - TeamTrack */
        .icon.green {
            background: linear-gradient(135deg, rgba(100, 220, 100, 0.9) 0%, rgba(34, 197, 94, 0.7) 50%, rgba(22, 163, 74, 0.8) 100%);
            box-shadow:
                0 0 20px rgba(34, 197, 94, 0.6),
                0 0 40px rgba(34, 197, 94, 0.4),
                0 0 60px rgba(34, 197, 94, 0.3),
                0 0 80px rgba(34, 197, 94, 0.2),
                inset 0 0 30px rgba(150, 255, 150, 0.3),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(150, 255, 150, 0.5);
            animation: pulse-green 2s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(34, 197, 94, 0.6),
                    0 0 40px rgba(34, 197, 94, 0.4),
                    0 0 60px rgba(34, 197, 94, 0.3),
                    0 0 80px rgba(34, 197, 94, 0.2),
                    inset 0 0 30px rgba(150, 255, 150, 0.3),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(34, 197, 94, 0.8),
                    0 0 60px rgba(34, 197, 94, 0.5),
                    0 0 90px rgba(34, 197, 94, 0.4),
                    0 0 120px rgba(34, 197, 94, 0.3),
                    inset 0 0 30px rgba(150, 255, 150, 0.4),
                    inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            }
        }

        .icon-link:hover .icon.green {
            box-shadow:
                0 0 40px rgba(34, 197, 94, 0.9),
                0 0 80px rgba(34, 197, 94, 0.6),
                0 0 120px rgba(34, 197, 94, 0.4),
                0 0 160px rgba(34, 197, 94, 0.3),
                inset 0 0 30px rgba(150, 255, 150, 0.5),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .label.green {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://play.eventday.dk" class="icon-link">
            <div class="icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
            <span class="label">TeamPlay</span>
        </a>

        <a href="https://taste.eventday.dk" class="icon-link">
            <div class="icon gold">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
                </svg>
            </div>
            <span class="label gold">TeamTaste</span>
        </a>

        <a href="https://track.eventday.dk" class="icon-link">
            <div class="icon green">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
            </div>
            <span class="label green">TeamTrack</span>
        </a>
    </div>
</body>
</html>
