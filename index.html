<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMES by TEAMBATTLE</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px 50px;
            padding: 40px;
            justify-items: center;
        }

        .icon-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .icon-link:hover { transform: scale(1.1); }

        .icon {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .icon::before {
            content: '';
            position: absolute;
            top: 10%; left: 20%; width: 60%; height: 30%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        .icon svg {
            width: 60px; height: 60px;
            fill: rgba(0,0,0,0.8);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            position: relative; z-index: 1;
        }

        .label {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .l-white { color: rgba(255,255,255,0.85); }

        /* Orange - TeamPlay */
        .c-orange { background: linear-gradient(135deg, rgba(255,140,50,0.9), rgba(255,102,0,0.7) 50%, rgba(200,80,0,0.8)); box-shadow: 0 0 20px rgba(255,102,0,0.6), 0 0 40px rgba(255,102,0,0.4), 0 0 60px rgba(255,102,0,0.3), inset 0 0 30px rgba(255,180,100,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(255,180,100,0.5); animation: p-orange 2s ease-in-out infinite; }
        @keyframes p-orange { 0%,100% { box-shadow: 0 0 20px rgba(255,102,0,0.6), 0 0 40px rgba(255,102,0,0.4), 0 0 60px rgba(255,102,0,0.3), inset 0 0 30px rgba(255,180,100,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(255,102,0,0.8), 0 0 60px rgba(255,102,0,0.5), 0 0 90px rgba(255,102,0,0.4), inset 0 0 30px rgba(255,180,100,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-orange { box-shadow: 0 0 40px rgba(255,102,0,0.9), 0 0 80px rgba(255,102,0,0.6), 0 0 120px rgba(255,102,0,0.4), inset 0 0 30px rgba(255,180,100,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-orange { color: #ff6600; }

        /* Pink/Magenta - TeamChallenge */
        .c-pink { background: linear-gradient(135deg, rgba(255,100,180,0.9), rgba(220,50,140,0.7) 50%, rgba(180,30,110,0.8)); box-shadow: 0 0 20px rgba(220,50,140,0.6), 0 0 40px rgba(220,50,140,0.4), 0 0 60px rgba(220,50,140,0.3), inset 0 0 30px rgba(255,150,200,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(255,150,200,0.5); animation: p-pink 2s ease-in-out infinite; }
        @keyframes p-pink { 0%,100% { box-shadow: 0 0 20px rgba(220,50,140,0.6), 0 0 40px rgba(220,50,140,0.4), 0 0 60px rgba(220,50,140,0.3), inset 0 0 30px rgba(255,150,200,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(220,50,140,0.8), 0 0 60px rgba(220,50,140,0.5), 0 0 90px rgba(220,50,140,0.4), inset 0 0 30px rgba(255,150,200,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-pink { box-shadow: 0 0 40px rgba(220,50,140,0.9), 0 0 80px rgba(220,50,140,0.6), 0 0 120px rgba(220,50,140,0.4), inset 0 0 30px rgba(255,150,200,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-pink { color: #dc328c; }

        /* Gold - TeamTaste */
        .c-gold { background: linear-gradient(135deg, rgba(255,215,100,0.9), rgba(218,165,32,0.7) 50%, rgba(184,134,11,0.8)); box-shadow: 0 0 20px rgba(218,165,32,0.6), 0 0 40px rgba(218,165,32,0.4), 0 0 60px rgba(218,165,32,0.3), inset 0 0 30px rgba(255,235,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(255,235,150,0.5); animation: p-gold 2s ease-in-out infinite; }
        @keyframes p-gold { 0%,100% { box-shadow: 0 0 20px rgba(218,165,32,0.6), 0 0 40px rgba(218,165,32,0.4), 0 0 60px rgba(218,165,32,0.3), inset 0 0 30px rgba(255,235,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(218,165,32,0.8), 0 0 60px rgba(218,165,32,0.5), 0 0 90px rgba(218,165,32,0.4), inset 0 0 30px rgba(255,235,150,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-gold { box-shadow: 0 0 40px rgba(218,165,32,0.9), 0 0 80px rgba(218,165,32,0.6), 0 0 120px rgba(218,165,32,0.4), inset 0 0 30px rgba(255,235,150,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-gold { color: #daa520; }

        /* Blue - TeamLazer */
        .c-blue { background: linear-gradient(135deg, rgba(80,130,255,0.9), rgba(30,80,220,0.7) 50%, rgba(15,50,180,0.8)); box-shadow: 0 0 20px rgba(30,80,220,0.6), 0 0 40px rgba(30,80,220,0.4), 0 0 60px rgba(30,80,220,0.3), inset 0 0 30px rgba(120,160,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(120,160,255,0.5); animation: p-blue 2s ease-in-out infinite; }
        @keyframes p-blue { 0%,100% { box-shadow: 0 0 20px rgba(30,80,220,0.6), 0 0 40px rgba(30,80,220,0.4), 0 0 60px rgba(30,80,220,0.3), inset 0 0 30px rgba(120,160,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(30,80,220,0.8), 0 0 60px rgba(30,80,220,0.5), 0 0 90px rgba(30,80,220,0.4), inset 0 0 30px rgba(120,160,255,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-blue { box-shadow: 0 0 40px rgba(30,80,220,0.9), 0 0 80px rgba(30,80,220,0.6), 0 0 120px rgba(30,80,220,0.4), inset 0 0 30px rgba(120,160,255,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-blue { color: #3b82f6; }

        /* Light Green - TeamRobin */
        .c-lightgreen { background: linear-gradient(135deg, rgba(140,255,140,0.9), rgba(80,220,80,0.7) 50%, rgba(50,190,50,0.8)); box-shadow: 0 0 20px rgba(80,220,80,0.6), 0 0 40px rgba(80,220,80,0.4), 0 0 60px rgba(80,220,80,0.3), inset 0 0 30px rgba(170,255,170,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(170,255,170,0.5); animation: p-lightgreen 2s ease-in-out infinite; }
        @keyframes p-lightgreen { 0%,100% { box-shadow: 0 0 20px rgba(80,220,80,0.6), 0 0 40px rgba(80,220,80,0.4), 0 0 60px rgba(80,220,80,0.3), inset 0 0 30px rgba(170,255,170,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(80,220,80,0.8), 0 0 60px rgba(80,220,80,0.5), 0 0 90px rgba(80,220,80,0.4), inset 0 0 30px rgba(170,255,170,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-lightgreen { box-shadow: 0 0 40px rgba(80,220,80,0.9), 0 0 80px rgba(80,220,80,0.6), 0 0 120px rgba(80,220,80,0.4), inset 0 0 30px rgba(170,255,170,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-lightgreen { color: #50dc50; }

        /* Red - TeamSegway */
        .c-red { background: linear-gradient(135deg, rgba(255,100,100,0.9), rgba(220,50,50,0.7) 50%, rgba(180,30,30,0.8)); box-shadow: 0 0 20px rgba(220,50,50,0.6), 0 0 40px rgba(220,50,50,0.4), 0 0 60px rgba(220,50,50,0.3), inset 0 0 30px rgba(255,150,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(255,150,150,0.5); animation: p-red 2s ease-in-out infinite; }
        @keyframes p-red { 0%,100% { box-shadow: 0 0 20px rgba(220,50,50,0.6), 0 0 40px rgba(220,50,50,0.4), 0 0 60px rgba(220,50,50,0.3), inset 0 0 30px rgba(255,150,150,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(220,50,50,0.8), 0 0 60px rgba(220,50,50,0.5), 0 0 90px rgba(220,50,50,0.4), inset 0 0 30px rgba(255,150,150,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-red { box-shadow: 0 0 40px rgba(220,50,50,0.9), 0 0 80px rgba(220,50,50,0.6), 0 0 120px rgba(220,50,50,0.4), inset 0 0 30px rgba(255,150,150,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-red { color: #dc3232; }

        /* Purple - TeamConnect */
        .c-purple { background: linear-gradient(135deg, rgba(190,130,255,0.9), rgba(140,70,220,0.7) 50%, rgba(100,40,180,0.8)); box-shadow: 0 0 20px rgba(140,70,220,0.6), 0 0 40px rgba(140,70,220,0.4), 0 0 60px rgba(140,70,220,0.3), inset 0 0 30px rgba(200,160,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(200,160,255,0.5); animation: p-purple 2s ease-in-out infinite; }
        @keyframes p-purple { 0%,100% { box-shadow: 0 0 20px rgba(140,70,220,0.6), 0 0 40px rgba(140,70,220,0.4), 0 0 60px rgba(140,70,220,0.3), inset 0 0 30px rgba(200,160,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(140,70,220,0.8), 0 0 60px rgba(140,70,220,0.5), 0 0 90px rgba(140,70,220,0.4), inset 0 0 30px rgba(200,160,255,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-purple { box-shadow: 0 0 40px rgba(140,70,220,0.9), 0 0 80px rgba(140,70,220,0.6), 0 0 120px rgba(140,70,220,0.4), inset 0 0 30px rgba(200,160,255,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-purple { color: #a855f7; }

        /* Dark Green - TeamBox */
        .c-darkgreen { background: linear-gradient(135deg, rgba(60,140,60,0.9), rgba(30,100,30,0.7) 50%, rgba(15,70,15,0.8)); box-shadow: 0 0 20px rgba(30,100,30,0.6), 0 0 40px rgba(30,100,30,0.4), 0 0 60px rgba(30,100,30,0.3), inset 0 0 30px rgba(80,160,80,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(80,160,80,0.5); animation: p-darkgreen 2s ease-in-out infinite; }
        @keyframes p-darkgreen { 0%,100% { box-shadow: 0 0 20px rgba(30,100,30,0.6), 0 0 40px rgba(30,100,30,0.4), 0 0 60px rgba(30,100,30,0.3), inset 0 0 30px rgba(80,160,80,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(30,100,30,0.8), 0 0 60px rgba(30,100,30,0.5), 0 0 90px rgba(30,100,30,0.4), inset 0 0 30px rgba(80,160,80,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-darkgreen { box-shadow: 0 0 40px rgba(30,100,30,0.9), 0 0 80px rgba(30,100,30,0.6), 0 0 120px rgba(30,100,30,0.4), inset 0 0 30px rgba(80,160,80,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-darkgreen { color: #2d8a2d; }

        /* White/Gray - TeamControl */
        .c-gray { background: linear-gradient(135deg, rgba(180,180,190,0.9), rgba(120,120,140,0.7) 50%, rgba(80,80,100,0.8)); box-shadow: 0 0 20px rgba(140,140,160,0.6), 0 0 40px rgba(140,140,160,0.4), 0 0 60px rgba(140,140,160,0.3), inset 0 0 30px rgba(200,200,220,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(200,200,220,0.5); animation: p-gray 2s ease-in-out infinite; }
        @keyframes p-gray { 0%,100% { box-shadow: 0 0 20px rgba(140,140,160,0.6), 0 0 40px rgba(140,140,160,0.4), 0 0 60px rgba(140,140,160,0.3), inset 0 0 30px rgba(200,200,220,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(140,140,160,0.8), 0 0 60px rgba(140,140,160,0.5), 0 0 90px rgba(140,140,160,0.4), inset 0 0 30px rgba(200,200,220,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-gray { box-shadow: 0 0 40px rgba(140,140,160,0.9), 0 0 80px rgba(140,140,160,0.6), 0 0 120px rgba(140,140,160,0.4), inset 0 0 30px rgba(200,200,220,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-gray { color: #c0c0d0; }

        /* Cyan - TeamAction */
        .c-cyan { background: linear-gradient(135deg, rgba(80,220,255,0.9), rgba(0,180,230,0.7) 50%, rgba(0,140,190,0.8)); box-shadow: 0 0 20px rgba(0,180,230,0.6), 0 0 40px rgba(0,180,230,0.4), 0 0 60px rgba(0,180,230,0.3), inset 0 0 30px rgba(120,230,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(120,230,255,0.5); animation: p-cyan 2s ease-in-out infinite; }
        @keyframes p-cyan { 0%,100% { box-shadow: 0 0 20px rgba(0,180,230,0.6), 0 0 40px rgba(0,180,230,0.4), 0 0 60px rgba(0,180,230,0.3), inset 0 0 30px rgba(120,230,255,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(0,180,230,0.8), 0 0 60px rgba(0,180,230,0.5), 0 0 90px rgba(0,180,230,0.4), inset 0 0 30px rgba(120,230,255,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-cyan { box-shadow: 0 0 40px rgba(0,180,230,0.9), 0 0 80px rgba(0,180,230,0.6), 0 0 120px rgba(0,180,230,0.4), inset 0 0 30px rgba(120,230,255,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-cyan { color: #00b4e6; }

        /* Yellow - TeamConstruct */
        .c-yellow { background: linear-gradient(135deg, rgba(255,220,80,0.9), rgba(230,180,20,0.7) 50%, rgba(200,150,0,0.8)); box-shadow: 0 0 20px rgba(230,180,20,0.6), 0 0 40px rgba(230,180,20,0.4), 0 0 60px rgba(230,180,20,0.3), inset 0 0 30px rgba(255,235,120,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(255,235,120,0.5); animation: p-yellow 2s ease-in-out infinite; }
        @keyframes p-yellow { 0%,100% { box-shadow: 0 0 20px rgba(230,180,20,0.6), 0 0 40px rgba(230,180,20,0.4), 0 0 60px rgba(230,180,20,0.3), inset 0 0 30px rgba(255,235,120,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(230,180,20,0.8), 0 0 60px rgba(230,180,20,0.5), 0 0 90px rgba(230,180,20,0.4), inset 0 0 30px rgba(255,235,120,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-yellow { box-shadow: 0 0 40px rgba(230,180,20,0.9), 0 0 80px rgba(230,180,20,0.6), 0 0 120px rgba(230,180,20,0.4), inset 0 0 30px rgba(255,235,120,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-yellow { color: #e6b414; }

        /* Black/Orange - TeamRace */
        .c-black { background: linear-gradient(135deg, rgba(80,80,80,0.9), rgba(40,40,40,0.7) 50%, rgba(15,15,15,0.8)); box-shadow: 0 0 20px rgba(80,80,80,0.6), 0 0 40px rgba(80,80,80,0.4), 0 0 60px rgba(60,60,60,0.3), inset 0 0 30px rgba(120,120,120,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(150,150,150,0.4); animation: p-black 2s ease-in-out infinite; }
        .c-black svg { fill: rgba(255,255,255,0.9); }
        @keyframes p-black { 0%,100% { box-shadow: 0 0 20px rgba(80,80,80,0.6), 0 0 40px rgba(80,80,80,0.4), 0 0 60px rgba(60,60,60,0.3), inset 0 0 30px rgba(120,120,120,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(100,100,100,0.8), 0 0 60px rgba(80,80,80,0.5), 0 0 90px rgba(60,60,60,0.4), inset 0 0 30px rgba(120,120,120,0.4), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-black { box-shadow: 0 0 40px rgba(120,120,120,0.9), 0 0 80px rgba(100,100,100,0.6), 0 0 120px rgba(80,80,80,0.4), inset 0 0 30px rgba(150,150,150,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-black { color: #c0c0c0; }

        /* Music Green - TeamMusic (animated equalizer) */
        .c-music { background: linear-gradient(135deg, rgba(110,240,150,0.9), rgba(34,197,94,0.75) 50%, rgba(20,140,65,0.85)); box-shadow: 0 0 20px rgba(34,197,94,0.6), 0 0 40px rgba(34,197,94,0.4), 0 0 60px rgba(34,197,94,0.3), inset 0 0 30px rgba(160,255,190,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); border: 2px solid rgba(160,255,190,0.5); animation: p-music 2s ease-in-out infinite; }
        @keyframes p-music { 0%,100% { box-shadow: 0 0 20px rgba(34,197,94,0.6), 0 0 40px rgba(34,197,94,0.4), 0 0 60px rgba(34,197,94,0.3), inset 0 0 30px rgba(160,255,190,0.3), inset 0 -20px 40px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px rgba(34,197,94,0.9), 0 0 60px rgba(34,197,94,0.55), 0 0 90px rgba(34,197,94,0.4), inset 0 0 30px rgba(160,255,190,0.45), inset 0 -20px 40px rgba(0,0,0,0.2); } }
        .icon-link:hover .c-music { box-shadow: 0 0 40px rgba(34,197,94,0.95), 0 0 80px rgba(34,197,94,0.65), 0 0 120px rgba(34,197,94,0.45), inset 0 0 30px rgba(160,255,190,0.5), inset 0 -20px 40px rgba(0,0,0,0.2); animation: none; }
        .l-music { color: #22c55e; }

        /* Equalizer bars inside music icon */
        .c-music svg .eq-bar {
            fill: #ffffff;
            transform-box: fill-box;
            transform-origin: center bottom;
            animation: eq-dance 0.9s ease-in-out infinite alternate;
        }
        .c-music svg .eq-bar-1 { animation-duration: 0.7s; animation-delay: 0.00s; }
        .c-music svg .eq-bar-2 { animation-duration: 0.55s; animation-delay: 0.12s; }
        .c-music svg .eq-bar-3 { animation-duration: 0.85s; animation-delay: 0.05s; }
        .c-music svg .eq-bar-4 { animation-duration: 0.65s; animation-delay: 0.18s; }
        .c-music svg .eq-bar-5 { animation-duration: 0.75s; animation-delay: 0.08s; }
        .icon-link:hover .c-music svg .eq-bar { animation-duration: 0.35s; }
        @keyframes eq-dance {
            0%   { transform: scaleY(0.25); }
            100% { transform: scaleY(1); }
        }

        /* Music tile sits alone on row 4 — span full grid width so justify-items:center centers it */
        .icon-link.music-tile { grid-column: 1 / -1; }

        @media (max-width: 900px) {
            .container { grid-template-columns: repeat(2, 1fr); gap: 25px; }
            .icon { width: 100px; height: 100px; }
            .icon svg { width: 44px; height: 44px; }
            .label { font-size: 13px; }
        }
        /* Intro Animation */
        .intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: intro-fadeout 0.8s ease 4.2s forwards;
        }
        @keyframes intro-fadeout {
            to { opacity: 0; pointer-events: none; }
        }

        .intro-logo {
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: intro-zoom 1.5s ease 0.3s forwards;
        }
        .intro-logo .w { color: #fff; }
        .intro-logo .o { color: #ff6600; }
        @keyframes intro-zoom {
            0% { opacity: 0; transform: scale(0.3); filter: blur(20px); }
            60% { opacity: 1; transform: scale(1.05); filter: blur(0); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .intro-sub {
            color: #666;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0;
            animation: intro-slide 1s ease 1.8s forwards;
        }
        @keyframes intro-slide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .intro-line {
            width: 0;
            height: 2px;
            background: #ff6600;
            margin-top: 25px;
            animation: intro-line-grow 1.2s ease 2.5s forwards;
        }
        @keyframes intro-line-grow {
            to { width: 200px; }
        }

        .intro-tagline {
            color: #ff6600;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
            animation: intro-slide 0.8s ease 3.2s forwards;
        }

        .container { opacity: 0; animation: content-in 0.8s ease 4.5s forwards; }
        @keyframes content-in { to { opacity: 1; } }

        /* Orange icons with white glyphs, subtle gloss + drop shadow */
        .icon {
            background: linear-gradient(135deg, #ff8a3d 0%, #ff6600 55%, #cc5200 100%);
            border: 2px solid rgba(255, 160, 80, 0.55);
            box-shadow:
                0 8px 18px rgba(0, 0, 0, 0.45),
                0 2px 4px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(255, 102, 0, 0.35),
                inset 0 -12px 24px rgba(0, 0, 0, 0.25);
            animation: none;
        }
        .icon::before {
            display: block;
            content: '';
            position: absolute;
            top: 8%; left: 18%; width: 64%; height: 32%;
            background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            pointer-events: none;
        }
        .icon svg {
            fill: #fff;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.35));
        }
        .icon-link:hover .icon {
            box-shadow:
                0 10px 24px rgba(0, 0, 0, 0.5),
                0 3px 6px rgba(0, 0, 0, 0.35),
                0 0 50px rgba(255, 102, 0, 0.6),
                inset 0 -12px 24px rgba(0, 0, 0, 0.25);
            animation: none;
        }

        /* Subtitle styling: "by TeamBattle" */
        .intro-sub { color: #888; text-transform: none; letter-spacing: 4px; }
        .intro-sub .by { color: rgba(255, 255, 255, 0.45); }
        .intro-sub .w { color: #fff; font-weight: bold; }
        .intro-sub .o { color: #ff6600; font-weight: bold; }

        /* Fireflies */
        .fireflies {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffb060;
            border-radius: 50%;
            box-shadow:
                0 0 6px 2px rgba(255, 140, 50, 0.9),
                0 0 14px 4px rgba(255, 102, 0, 0.5),
                0 0 28px 8px rgba(255, 102, 0, 0.25);
            opacity: 0;
            animation-name: firefly-drift, firefly-twinkle;
            animation-iteration-count: infinite, infinite;
            animation-timing-function: ease-in-out, ease-in-out;
        }
        @keyframes firefly-drift {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(35px, -25px); }
            50%  { transform: translate(10px, -55px); }
            75%  { transform: translate(-30px, -30px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes firefly-twinkle {
            0%, 100% { opacity: 0.15; }
            50%      { opacity: 1; }
        }
    </style>
</head>

    <script>
        (function () {
            function enterFullscreen() {
                var el = document.documentElement;
                var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
                if (!req) return;
                try {
                    var result = req.call(el);
                    if (result && typeof result.then === 'function') {
                        result.catch(function () { /* ignored — requires user gesture */ });
                    }
                } catch (e) { /* ignored */ }
            }

            function isFullscreen() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            }

            // Trigger on first user gesture (browsers block fullscreen without one)
            function onFirstGesture() {
                if (!isFullscreen()) enterFullscreen();
                document.removeEventListener('click', onFirstGesture, true);
                document.removeEventListener('keydown', onFirstGesture, true);
                document.removeEventListener('touchstart', onFirstGesture, true);
            }
            document.addEventListener('click', onFirstGesture, true);
            document.addEventListener('keydown', onFirstGesture, true);
            document.addEventListener('touchstart', onFirstGesture, true);
        })();
    </script>
